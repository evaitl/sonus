# Path-based Sonus on the default Apache site (no separate vhost).
#
# Full guide: apache/DEPLOYMENT.md
#
# Serves the library at http://localhost/sonus/
#
# Install:
#   ./scripts/setup-data-dir.sh
#   sudo cp apache/sonus.conf /etc/apache2/conf-available/sonus.conf
#   sudo a2enconf sonus
#   sudo apache2ctl configtest
#   sudo systemctl reload apache2

Define SONUS_ROOT /home/evaitl/programming/sonus
Define SONUS_PATH /sonus

# Music directories for stream.py (colon-separated). Must match where sonus scan indexes.
# SetEnv SONUS_SCAN_PATHS /media/music

# Stable secret for login cookies (generate once; required for production).
# SetEnv SONUS_SESSION_SECRET "replace-with-a-long-random-string"

# AcoustID API key for admin track identification (https://acoustid.org/new-application).
# Requires libchromaprint-tools (fpcalc) on the server.
# SetEnv SONUS_ACOUSTID_CLIENT "your-api-key-here"

ScriptAlias ${SONUS_PATH}/cgi-bin/ ${SONUS_ROOT}/web/cgi-bin/

<Directory ${SONUS_ROOT}/web/cgi-bin>
    Options +ExecCGI
    SetHandler cgi-script
    Require all granted

    SetEnv SONUS_DATABASE_PATH ${SONUS_ROOT}/data/library.db
    SetEnv SONUS_CGI_PREFIX ${SONUS_PATH}/cgi-bin/
    SetEnv SONUS_STATIC_URL ${SONUS_PATH}/static/style.css
</Directory>

Alias ${SONUS_PATH}/ ${SONUS_ROOT}/web/

<Directory ${SONUS_ROOT}/web>
    Require all granted
</Directory>

RedirectMatch ^/sonus/?$ /sonus/cgi-bin/index.py
